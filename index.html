<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello, Vercel!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 3rem 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #f1f5f9;
    }

    .card {
      text-align: center;
      padding: 3rem 2.5rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      max-width: 480px;
      width: 100%;
    }

    h1 {
      font-size: 2.25rem;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: #f1f5f9;
      text-align: left;
    }

    p {
      color: #94a3b8;
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .badge {
      display: inline-block;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.15);
      border: 1px solid rgba(56, 189, 248, 0.3);
      color: #38bdf8;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .timestamp {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #475569;
    }

    /* Contact form */
    .form-card {
      max-width: 480px;
      width: 100%;
      padding: 2.5rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }

    .field {
      margin-bottom: 1.25rem;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 0.4rem;
    }

    input,
    textarea {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(15, 23, 42, 0.6);
      color: #f1f5f9;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s ease;
    }

    input:focus,
    textarea:focus {
      border-color: #38bdf8;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .error-msg {
      color: #f87171;
      font-size: 0.8rem;
      margin-top: 0.35rem;
      min-height: 1rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: #0f172a;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.15s ease;
    }

    button[type="submit"]:hover {
      opacity: 0.9;
    }

    .success-msg {
      display: none;
      text-align: center;
      padding: 1rem;
      border-radius: 8px;
      background: rgba(74, 222, 128, 0.12);
      border: 1px solid rgba(74, 222, 128, 0.35);
      color: #4ade80;
      font-size: 0.95rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">✓ Deployment Successful</span>
    <h1>It works! 🎉</h1>
    <p>This is a basic test site, deployed and served from Vercel. If you can see this page, your deployment pipeline is working correctly.</p>
    <div class="timestamp" id="timestamp"></div>
  </div>

  <div class="form-card">
    <h2>Contact Us</h2>
    <form id="contactForm" novalidate>
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" />
        <div class="error-msg" id="nameError"></div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" />
        <div class="error-msg" id="emailError"></div>
      </div>

      <div class="field">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567" />
        <div class="error-msg" id="phoneError"></div>
      </div>

      <div class="field">
        <label for="comments">Comments</label>
        <textarea id="comments" name="comments" placeholder="How can we help?"></textarea>
        <div class="error-msg" id="commentsError"></div>
      </div>

      <button type="submit">Send Message</button>
      <div class="success-msg" id="successMsg">Thanks! Your message has been received.</div>
    </form>
  </div>

  <script>
    document.getElementById('timestamp').textContent =
      'Page loaded: ' + new Date().toLocaleString();

    const form = document.getElementById('contactForm');
    const successMsg = document.getElementById('successMsg');

    function setError(fieldId, message) {
      document.getElementById(fieldId + 'Error').textContent = message;
    }

    function clearErrors() {
      ['name', 'email', 'phone', 'comments'].forEach(id => setError(id, ''));
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      clearErrors();
      successMsg.style.display = 'none';
      successMsg.style.color = '';
      successMsg.style.background = '';
      successMsg.style.borderColor = '';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const comments = document.getElementById('comments').value.trim();

      let isValid = true;

      if (!name) {
        setError('name', 'Please enter your name.');
        isValid = false;
      }

      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email) {
        setError('email', 'Please enter your email.');
        isValid = false;
      } else if (!emailPattern.test(email)) {
        setError('email', 'Please enter a valid email address.');
        isValid = false;
      }

      const phonePattern = /^[\d\s\-\+\(\)]{7,}$/;
      if (!phone) {
        setError('phone', 'Please enter your phone number.');
        isValid = false;
      } else if (!phonePattern.test(phone)) {
        setError('phone', 'Please enter a valid phone number.');
        isValid = false;
      }

      if (!comments) {
        setError('comments', 'Please enter a comment.');
        isValid = false;
      }

      if (!isValid) return;

      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const response = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, comments }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Something went wrong.');
        }

        successMsg.textContent = 'Thanks! Your message has been sent.';
        successMsg.style.display = 'block';
        form.reset();
      } catch (err) {
        successMsg.textContent = err.message || 'Something went wrong. Please try again.';
        successMsg.style.display = 'block';
        successMsg.style.color = '#f87171';
        successMsg.style.background = 'rgba(248, 113, 113, 0.12)';
        successMsg.style.borderColor = 'rgba(248, 113, 113, 0.35)';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Message';
      }
    });
  </script>
</body>
</html>
