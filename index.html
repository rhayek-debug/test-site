<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to Our Insurance Website</title>
  <link rel="stylesheet" href="https://unpkg.com/@geoapify/geocoder-autocomplete/styles/minimal.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 3rem 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #eafaf1 0%, #d7f2e3 50%, #eafaf1 100%);
      color: #1e3a2f;
    }

    .card {
      text-align: center;
      padding: 3rem 2.5rem;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(45, 122, 79, 0.15);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      max-width: 560px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(45, 122, 79, 0.08);
    }

    h1 {
      font-size: 2.25rem;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #2d7a4f, #4caf7d);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: #1e3a2f;
      text-align: left;
    }

    p {
      color: #3f5f4f;
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .badge {
      display: inline-block;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      background: rgba(76, 175, 125, 0.15);
      border: 1px solid rgba(76, 175, 125, 0.4);
      color: #2d7a4f;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* Coverage icons */
    .coverage-card {
      max-width: 560px;
      width: 100%;
      padding: 2.5rem;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(45, 122, 79, 0.15);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 24px rgba(45, 122, 79, 0.08);
    }

    .coverage-card h2 {
      text-align: center;
    }

    .coverage-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 1.25rem;
    }

    .coverage-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      padding: 1rem 0.5rem;
      border-radius: 12px;
      transition: background 0.15s ease;
    }

    .coverage-item:hover {
      background: rgba(76, 175, 125, 0.1);
    }

    .coverage-item .icon-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4caf7d, #2d7a4f);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .coverage-item svg {
      width: 28px;
      height: 28px;
      stroke: #ffffff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .coverage-item span {
      font-size: 0.85rem;
      font-weight: 600;
      color: #2d5a41;
    }

    .timestamp {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #6b8577;
    }

    /* Contact form */
    .form-card {
      max-width: 560px;
      width: 100%;
      padding: 2.5rem;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(45, 122, 79, 0.15);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 24px rgba(45, 122, 79, 0.08);
    }

    .field {
      margin-bottom: 1.25rem;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #2d5a41;
      margin-bottom: 0.4rem;
    }

    input,
    textarea {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border-radius: 8px;
      border: 1px solid rgba(45, 122, 79, 0.25);
      background: rgba(255, 255, 255, 0.9);
      color: #1e3a2f;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s ease;
    }

    input:focus,
    textarea:focus {
      border-color: #2d7a4f;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .error-msg {
      color: #c0392b;
      font-size: 0.8rem;
      margin-top: 0.35rem;
      min-height: 1rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #4caf7d, #2d7a4f);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.15s ease;
    }

    button[type="submit"]:hover {
      opacity: 0.9;
    }

    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .success-msg {
      display: none;
      text-align: center;
      padding: 1rem;
      border-radius: 8px;
      background: rgba(76, 175, 125, 0.15);
      border: 1px solid rgba(76, 175, 125, 0.4);
      color: #2d7a4f;
      font-size: 0.95rem;
      margin-top: 1rem;
    }

    /* Geoapify autocomplete theming */
    #propertyAddressAutocomplete {
      position: relative;
    }

    .geoapify-autocomplete-input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border-radius: 8px;
      border: 1px solid rgba(45, 122, 79, 0.25);
      background: rgba(255, 255, 255, 0.9);
      color: #1e3a2f;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
    }

    .geoapify-autocomplete-input:focus {
      border-color: #2d7a4f;
    }

    .geoapify-autocomplete-items {
      border: 1px solid rgba(45, 122, 79, 0.25);
      border-radius: 8px;
      overflow: hidden;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">✓ Deployment Successful</span>
    <h1>Welcome to Our Insurance Website</h1>
    <p>We're glad you're here. Explore our coverage options below, or reach out using the contact form and one of our agents will be in touch.</p>
    <div class="timestamp" id="timestamp"></div>
  </div>

  <div class="coverage-card">
    <h2 style="text-align:center;">Our Coverage</h2>
    <div class="coverage-grid">
      <div class="coverage-item">
        <div class="icon-circle">
          <!-- Auto icon -->
          <svg viewBox="0 0 24 24">
            <path d="M3 13l1.5-4.5A2 2 0 0 1 6.4 7h11.2a2 2 0 0 1 1.9 1.5L21 13" />
            <rect x="2.5" y="13" width="19" height="5" rx="1.5" />
            <circle cx="7" cy="18.5" r="1.5" />
            <circle cx="17" cy="18.5" r="1.5" />
          </svg>
        </div>
        <span>Auto</span>
      </div>

      <div class="coverage-item">
        <div class="icon-circle">
          <!-- Home icon -->
          <svg viewBox="0 0 24 24">
            <path d="M3 11l9-7 9 7" />
            <path d="M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10" />
          </svg>
        </div>
        <span>Home</span>
      </div>

      <div class="coverage-item">
        <div class="icon-circle">
          <!-- Building icon -->
          <svg viewBox="0 0 24 24">
            <rect x="5" y="3" width="14" height="18" rx="1" />
            <line x1="9" y1="7" x2="9" y2="7" />
            <line x1="15" y1="7" x2="15" y2="7" />
            <line x1="9" y1="11" x2="9" y2="11" />
            <line x1="15" y1="11" x2="15" y2="11" />
            <line x1="9" y1="15" x2="9" y2="15" />
            <line x1="15" y1="15" x2="15" y2="15" />
            <path d="M10 21v-4h4v4" />
          </svg>
        </div>
        <span>Building</span>
      </div>

      <div class="coverage-item">
        <div class="icon-circle">
          <!-- Umbrella icon -->
          <svg viewBox="0 0 24 24">
            <path d="M12 3a9 9 0 0 1 9 9H3a9 9 0 0 1 9-9z" />
            <line x1="12" y1="3" x2="12" y2="2" />
            <line x1="12" y1="12" x2="12" y2="19" />
            <path d="M12 19a2 2 0 0 0 4 0" />
          </svg>
        </div>
        <span>Umbrella</span>
      </div>

      <div class="coverage-item">
        <div class="icon-circle">
          <!-- Business icon -->
          <svg viewBox="0 0 24 24">
            <rect x="3" y="8" width="18" height="12" rx="1.5" />
            <path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            <line x1="3" y1="13" x2="21" y2="13" />
          </svg>
        </div>
        <span>Business</span>
      </div>
    </div>
  </div>

  <div class="form-card">
    <h2>Contact Us</h2>
    <form id="contactForm" novalidate>
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" />
        <div class="error-msg" id="nameError"></div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" />
        <div class="error-msg" id="emailError"></div>
      </div>

      <div class="field">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567" />
        <div class="error-msg" id="phoneError"></div>
      </div>

      <div class="field">
        <label for="propertyAddressAutocomplete">Property Address</label>
        <div id="propertyAddressAutocomplete"></div>
        <input type="hidden" id="propertyAddress" name="propertyAddress" />
        <div class="error-msg" id="propertyAddressError"></div>
      </div>

      <div class="field">
        <label for="comments">Comments</label>
        <textarea id="comments" name="comments" placeholder="How can we help?"></textarea>
        <div class="error-msg" id="commentsError"></div>
      </div>

      <button type="submit">Send Message</button>
      <div class="success-msg" id="successMsg">Thanks! Your message has been received.</div>
    </form>
  </div>

  <script src="https://unpkg.com/@geoapify/geocoder-autocomplete/dist/index.min.js"></script>
  <script>
    document.getElementById('timestamp').textContent =
      'Page loaded: ' + new Date().toLocaleString();

    // Geoapify address autocomplete
    const geoapifyAutocomplete = new autocomplete.GeocoderAutocomplete(
      document.getElementById('propertyAddressAutocomplete'),
      '253ee9e386e840f98fc614f246a08fde',
      { placeholder: '123 Main St, Springfield', lang: 'en', limit: 5 }
    );

    geoapifyAutocomplete.on('select', function (location) {
      const formatted = location && location.properties ? location.properties.formatted : '';
      document.getElementById('propertyAddress').value = formatted || '';
      setError('propertyAddress', '');
    });

    geoapifyAutocomplete.on('input', function (value) {
      // Keep the hidden field in sync with manual typing too
      document.getElementById('propertyAddress').value = value || '';
    });

    const form = document.getElementById('contactForm');
    const successMsg = document.getElementById('successMsg');

    function setError(fieldId, message) {
      document.getElementById(fieldId + 'Error').textContent = message;
    }

    function clearErrors() {
      ['name', 'email', 'phone', 'propertyAddress', 'comments'].forEach(id => setError(id, ''));
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      clearErrors();
      successMsg.style.display = 'none';
      successMsg.style.color = '';
      successMsg.style.background = '';
      successMsg.style.borderColor = '';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const propertyAddress = document.getElementById('propertyAddress').value.trim();
      const comments = document.getElementById('comments').value.trim();

      let isValid = true;

      if (!name) {
        setError('name', 'Please enter your name.');
        isValid = false;
      }

      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email) {
        setError('email', 'Please enter your email.');
        isValid = false;
      } else if (!emailPattern.test(email)) {
        setError('email', 'Please enter a valid email address.');
        isValid = false;
      }

      const phonePattern = /^[\d\s\-\+\(\)]{7,}$/;
      if (!phone) {
        setError('phone', 'Please enter your phone number.');
        isValid = false;
      } else if (!phonePattern.test(phone)) {
        setError('phone', 'Please enter a valid phone number.');
        isValid = false;
      }

      if (!comments) {
        setError('comments', 'Please enter a comment.');
        isValid = false;
      }

      if (!isValid) return;

      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const response = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, propertyAddress, comments }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Something went wrong.');
        }

        successMsg.textContent = 'Thanks! Your message has been sent.';
        successMsg.style.display = 'block';
        form.reset();
      } catch (err) {
        successMsg.textContent = err.message || 'Something went wrong. Please try again.';
        successMsg.style.display = 'block';
        successMsg.style.color = '#c0392b';
        successMsg.style.background = 'rgba(192, 57, 43, 0.1)';
        successMsg.style.borderColor = 'rgba(192, 57, 43, 0.35)';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Message';
      }
    });
  </script>
</body>
</html>
